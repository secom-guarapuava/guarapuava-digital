<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0B3D91" />
<title>Guarapuava Digital — Protótipo</title>
<link rel="icon" href="brasao-icon.png" />
<meta name="description" content="Protótipo do app oficial da Prefeitura de Guarapuava. Serviços, notícias e orientações em um só lugar." />
<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="application-name" content="Guarapuava Digital" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Guarapuava Digital" />
<!-- Mapa: Leaflet + OpenStreetMap (grátis, sem chave de API) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
/* ============================================================
   GUARAPUAVA DIGITAL — DESIGN SYSTEM (tokens)
   ============================================================ */
:root{
  /* Azul institucional + escala */
  --azul-900:#0A2A63; --azul-800:#0B3D91; --azul-700:#0E4FB8;
  --azul-600:#1565E0; --azul-500:#2C7BF2; --azul-400:#5AA0FF;
  --azul-300:#9CC6FF; --azul-100:#E8F1FF; --azul-50:#F3F8FF;
  /* Gradientes */
  --grad-primary:linear-gradient(135deg,#0B3D91 0%,#1565E0 58%,#2C7BF2 100%);
  --grad-deep:linear-gradient(160deg,#0A2A63 0%,#0E4FB8 100%);
  /* Tinta / neutros */
  --ink-900:#0F1B2D; --ink-700:#33445C; --ink-500:#5B6B82; --ink-400:#8A98AC;
  --line:#E4EAF2; --line-2:#EEF2F8; --surface:#FFFFFF; --bg:#EAEFF6;
  /* Feedback (sempre com ícone+texto, nunca só cor) */
  --ok:#13864B; --ok-bg:#E4F6EC;
  --warn:#B5650A; --warn-bg:#FDEFD8;
  --danger:#C92A2A; --danger-bg:#FCE8E8;
  --info:#1565E0; --info-bg:#E8F1FF;
  /* Raio / sombra / espaço */
  --r-xl:26px; --r-lg:20px; --r-md:15px; --r-sm:11px; --r-pill:999px;
  --sh-1:0 1px 2px rgba(15,27,45,.06),0 2px 8px rgba(15,27,45,.05);
  --sh-2:0 6px 18px rgba(11,61,145,.10),0 2px 6px rgba(15,27,45,.06);
  --sh-hero:0 14px 34px rgba(11,61,145,.30);
  --font:'Segoe UI',system-ui,-apple-system,Roboto,'Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--font); color:var(--ink-900); background:#dde4ee;
  background-image:radial-gradient(1200px 600px at 70% -10%,#e9f0fb 0,#d7e0ec 60%,#cdd7e6 100%);
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  padding:26px 14px; gap:14px;
}
.proto-label{display:flex;align-items:center;gap:8px;color:#3a567f;font-size:13px;font-weight:600;letter-spacing:.2px}
.proto-label b{color:#0B3D91}
.proto-dot{width:7px;height:7px;border-radius:50%;background:#1565E0;box-shadow:0 0 0 4px rgba(21,101,224,.18)}

/* ===== Device frame ===== */
.device{
  width:392px; max-width:100%; height:850px; max-height:calc(100vh - 70px);
  background:#0A2A63; border-radius:46px; padding:13px;
  box-shadow:0 30px 70px rgba(10,42,99,.40),0 6px 18px rgba(0,0,0,.18);
  position:relative; flex:0 0 auto;
}
.screen-wrap{
  position:relative; width:100%; height:100%; background:var(--bg);
  border-radius:34px; overflow:hidden; display:flex; flex-direction:column;
}
/* status bar */
.statusbar{
  position:absolute;top:0;left:0;right:0;height:44px;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;color:#fff;font-size:13px;font-weight:600;pointer-events:none;
}
.statusbar .sb-right{display:flex;align-items:center;gap:6px}
.notch{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:118px;height:26px;background:#0A2A63;border-radius:0 0 16px 16px;z-index:41}

/* scroll viewport */
.viewport{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(92px + env(safe-area-inset-bottom))}
.viewport::-webkit-scrollbar{width:0}
.screen{display:none;animation:fade .28s ease}
.screen.is-active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ===== Gradient top / header ===== */
.top{background:var(--grad-primary);color:#fff;padding:52px 18px 20px;position:relative;overflow:hidden}
.top::after{content:"";position:absolute;width:240px;height:240px;right:-70px;top:-90px;background:radial-gradient(circle,rgba(255,255,255,.16),transparent 70%);border-radius:50%}
.top.compact{padding-bottom:18px}
.brandrow{display:flex;align-items:center;gap:11px;position:relative;z-index:2}
.brandrow .brasao{height:46px;width:auto;flex:0 0 auto;display:block;filter:drop-shadow(0 2px 5px rgba(0,0,0,.28))}
.brandrow .bt{flex:1;min-width:0}
.brandrow .bt small{display:block;font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;opacity:.82;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brandrow .bt h1{margin:1px 0 0;font-size:17px;font-weight:800;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconbtn{width:42px;height:42px;border-radius:14px;border:0;background:rgba(255,255,255,.16);color:#fff;display:grid;place-items:center;cursor:pointer;position:relative;flex:0 0 auto}
.iconbtn:active{transform:scale(.94)}
.badge-dot{position:absolute;top:8px;right:9px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:#FF5A5A;color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center;border:2px solid #1457c4}

.hero-greet{position:relative;z-index:2;margin-top:18px}
.hero-greet .hi{font-size:23px;font-weight:800;line-height:1.15}
.hero-greet .sub{margin-top:5px;font-size:13px;opacity:.9;max-width:90%}
/* search */
.search{position:relative;z-index:2;margin-top:16px;display:flex;align-items:center;gap:10px;background:#fff;border-radius:16px;padding:13px 14px;box-shadow:0 8px 20px rgba(10,42,99,.22)}
.search .ico{color:var(--azul-600);flex:0 0 auto}
.search input{border:0;outline:0;font-family:var(--font);font-size:15px;color:var(--ink-900);width:100%;background:transparent}
.search input::placeholder{color:var(--ink-400)}

/* page title (inner screens) */
.page-title{position:relative;z-index:2;margin-top:14px}
.page-title h2{margin:0;font-size:22px;font-weight:800}
.page-title p{margin:5px 0 0;font-size:13px;opacity:.9}

/* ===== Sheet (content over gradient) ===== */
.sheet{background:var(--bg);border-radius:22px 22px 0 0;margin-top:-14px;position:relative;z-index:3;padding:20px 16px 8px}
.section{margin-bottom:22px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:0 2px 12px}
.section-head h3{margin:0;font-size:16px;font-weight:800;color:var(--ink-900)}
.section-head .link{font-size:13px;font-weight:700;color:var(--azul-600);background:none;border:0;cursor:pointer;display:flex;align-items:center;gap:2px}
.muted{color:var(--ink-500)}

/* ===== Hero/destaque card ===== */
.feature{position:relative;border-radius:var(--r-lg);overflow:hidden;background:var(--grad-deep);color:#fff;padding:20px;box-shadow:var(--sh-hero)}
.feature::after{content:"";position:absolute;right:-50px;bottom:-70px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%);border-radius:50%}
.feature .tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);padding:5px 11px;border-radius:var(--r-pill);font-size:11.5px;font-weight:700;letter-spacing:.3px}
.feature h4{margin:12px 0 6px;font-size:20px;font-weight:800;line-height:1.2;position:relative;z-index:2}
.feature p{margin:0;font-size:13px;opacity:.92;position:relative;z-index:2;max-width:88%}
.feature .btn{margin-top:15px}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;cursor:pointer;font-family:var(--font);font-weight:700;font-size:15px;border-radius:14px;padding:13px 18px;text-decoration:none;transition:transform .06s,box-shadow .2s}
.btn:active{transform:scale(.97)}
.btn-light{background:#fff;color:var(--azul-700)}
.btn-primary{background:var(--azul-600);color:#fff;box-shadow:0 6px 16px rgba(21,101,224,.32)}
.btn-ghost{background:var(--azul-100);color:var(--azul-700)}
.btn-block{display:flex;width:100%}
.btn-danger{background:var(--danger);color:#fff}

/* ===== Quick access grid (home) ===== */
.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.quick .qi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:14px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;box-shadow:var(--sh-1);transition:transform .08s,box-shadow .2s}
.quick .qi:active{transform:scale(.96)}
.qi .chip{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:var(--azul-100);color:var(--azul-700)}
.qi .chip .ico{width:22px;height:22px}
.qi span{font-size:12.5px;font-weight:700;color:var(--ink-700);text-align:center;line-height:1.2}

/* ===== Service list cards ===== */
.srv{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:14px;cursor:pointer;box-shadow:var(--sh-1);margin-bottom:11px;transition:transform .08s}
.srv:active{transform:scale(.98)}
.srv .chip{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;flex:0 0 auto}
.srv .chip .ico{width:20px;height:20px}
.srv .tx{flex:1;min-width:0}
.srv .tx b{display:block;font-size:15px;font-weight:700;color:var(--ink-900)}
.srv .tx small{display:block;font-size:12.5px;color:var(--ink-500);margin-top:2px}
.srv .go{color:var(--ink-400);flex:0 0 auto}

/* ===== Chips / filtros ===== */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 8px;margin:0 -2px}
.chips::-webkit-scrollbar{height:0}
.chip-f{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--ink-700);font-size:13px;font-weight:700;padding:9px 14px;border-radius:var(--r-pill);cursor:pointer;white-space:nowrap}
.chip-f.is-on{background:var(--azul-600);color:#fff;border-color:var(--azul-600)}

/* ===== News cards ===== */
.news{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;box-shadow:var(--sh-1);margin-bottom:14px}
.news .thumb{height:150px;position:relative;display:flex;align-items:flex-end;padding:12px;overflow:hidden}
.news .thumb .scene{position:absolute;inset:0;width:100%;height:100%;display:block}
.news .thumb .pill{position:relative;z-index:2;box-shadow:0 2px 8px rgba(15,27,45,.16)}
.news.compact{display:flex;align-items:center;gap:12px;padding:11px}
.news.compact .thumb{height:62px;width:62px;border-radius:var(--r-sm);flex:0 0 auto;padding:0;display:grid;place-items:center}
.news.compact .thumb .thumb-ic{width:24px;height:24px;color:rgba(255,255,255,.95)}
.news.compact .body{padding:0;flex:1;min-width:0}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;letter-spacing:.3px;padding:5px 10px;border-radius:var(--r-pill);background:#fff;color:var(--azul-700)}
.news .body{padding:13px 14px 15px}
.news .body h4{margin:0 0 5px;font-size:15.5px;font-weight:800;line-height:1.25;color:var(--ink-900)}
.news.compact .body h4{font-size:14px;margin:0}
.news .body p{margin:0;font-size:13px;color:var(--ink-500);line-height:1.4}
.news .meta{display:flex;align-items:center;gap:7px;margin-top:10px;font-size:12px;color:var(--ink-400);font-weight:600}
.news.compact .meta{margin-top:6px}

/* ===== Alert cards ===== */
.alert{display:flex;gap:12px;border-radius:var(--r-md);padding:14px;align-items:flex-start;border:1px solid transparent;position:relative;overflow:hidden}
.alert::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px}
.alert .ico{flex:0 0 auto;width:22px;height:22px;margin-top:1px}
.alert .tx b{display:block;font-size:14.5px;font-weight:800;margin-bottom:3px}
.alert .tx p{margin:0;font-size:13px;line-height:1.4}
.alert .tx .lvl{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.alert.danger{background:var(--danger-bg);border-color:#f3c4c4;color:#7a1414}.alert.danger::before{background:var(--danger)}.alert.danger .ico{color:var(--danger)}
.alert.warn{background:var(--warn-bg);border-color:#f3dcb0;color:#6e3f06}.alert.warn::before{background:var(--warn)}.alert.warn .ico{color:var(--warn)}
.alert.info{background:var(--info-bg);border-color:#cfe0fb;color:#0c3a86}.alert.info::before{background:var(--info)}.alert.info .ico{color:var(--info)}
.alert.ok{background:var(--ok-bg);border-color:#bfe6cd;color:#0c5a33}.alert.ok::before{background:var(--ok)}.alert.ok .ico{color:var(--ok)}

/* ===== Generic info card ===== */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:16px;box-shadow:var(--sh-1)}
.card+.card{margin-top:11px}
.card h4{margin:0 0 6px;font-size:15px;font-weight:800}
.card p{margin:0;font-size:13.5px;color:var(--ink-500);line-height:1.5}

/* two-up health choice */
.duo{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.choice{border-radius:var(--r-lg);padding:16px;color:#fff;cursor:pointer;min-height:150px;display:flex;flex-direction:column;position:relative;overflow:hidden}
.choice .ico{width:24px;height:24px}
.choice b{font-size:18px;font-weight:800;margin-top:10px}
.choice small{font-size:12px;opacity:.92;margin-top:4px;line-height:1.35}
.choice .ver{margin-top:auto;font-size:12.5px;font-weight:800;display:flex;align-items:center;gap:3px}
.choice.ubs{background:linear-gradient(155deg,#13864B,#1FA862)}
.choice.upa{background:linear-gradient(155deg,#C92A2A,#E8543B)}

/* list of small items (quando ir) */
.tic{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:8px}
.tic .ico{width:20px;height:20px;flex:0 0 auto}
.tic.g .ico{color:var(--ok)} .tic.r .ico{color:var(--danger)}
.tic b{font-size:14px;font-weight:700}
.tic small{display:block;font-size:12px;color:var(--ink-500)}

/* phone/contact rows */
.contact{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:13px 14px;margin-bottom:9px;text-decoration:none;color:inherit}
.contact .chip{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:var(--azul-100);color:var(--azul-700);flex:0 0 auto}
.contact.urgent .chip{background:var(--danger-bg);color:var(--danger)}
.contact .tx{flex:1}.contact .tx b{display:block;font-size:14.5px;font-weight:700}.contact .tx small{font-size:12.5px;color:var(--ink-500)}
.contact .num{font-size:18px;font-weight:800;color:var(--azul-700)}
.contact.urgent .num{color:var(--danger)}

/* map placeholder */
.mapbox{height:170px;border-radius:var(--r-lg);overflow:hidden;position:relative;border:1px solid var(--line);background:
  linear-gradient(0deg,rgba(11,61,145,.05),rgba(11,61,145,.05)),
  repeating-linear-gradient(0deg,#dde7f4 0 1px,transparent 1px 26px),
  repeating-linear-gradient(90deg,#dde7f4 0 1px,transparent 1px 26px),#eef3fa;
  display:grid;place-items:center}
.mapbox .road{position:absolute;background:#cdd9ea}
.mapbox .r1{top:54%;left:0;right:0;height:14px;transform:rotate(-7deg)}
.mapbox .r2{top:0;bottom:0;left:38%;width:13px;transform:rotate(6deg)}
.mapbox .pin{position:absolute;color:var(--danger);filter:drop-shadow(0 4px 6px rgba(0,0,0,.2))}
.mapbox .tagm{position:relative;z-index:2;background:rgba(255,255,255,.92);padding:8px 14px;border-radius:var(--r-pill);font-size:12.5px;font-weight:700;color:var(--ink-700);box-shadow:var(--sh-1);display:flex;gap:6px;align-items:center}
/* Mapa real (Leaflet) */
.leafmap{height:200px;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--line);margin-bottom:10px;position:relative;z-index:0;background:var(--azul-50)}
.leaf-fallback{height:100%;display:grid;place-items:center;gap:6px;color:var(--ink-500);font-size:13px;font-weight:600}
.leaf-fallback .ico{width:18px;height:18px}
.leafmap .leaflet-control-attribution{font-size:9px}
.maplegend{display:flex;flex-wrap:wrap;gap:14px;margin:0 2px 16px;font-size:12px;color:var(--ink-600);font-weight:600}
.maplegend span{display:inline-flex;align-items:center;gap:6px}
.maplegend i{width:11px;height:11px;border-radius:50%;display:inline-block;box-shadow:0 0 0 2px #fff,0 0 0 3px var(--line)}

/* blockage card */
.block{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:15px;box-shadow:var(--sh-1);margin-bottom:12px}
.block .bh{display:flex;align-items:flex-start;gap:10px}
.block .bh .ico{color:var(--warn);flex:0 0 auto;margin-top:2px}
.block .bh b{font-size:15px;font-weight:800;line-height:1.25}
.status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;padding:5px 10px;border-radius:var(--r-pill);letter-spacing:.3px}
.status.run{background:var(--warn-bg);color:var(--warn)}
.status.prog{background:var(--info-bg);color:var(--info)}
.status.done{background:var(--ok-bg);color:var(--ok)}
.kv{display:flex;gap:8px;font-size:13px;margin-top:9px;color:var(--ink-700);align-items:flex-start}
.kv .k{color:var(--ink-400);min-width:74px;font-weight:600;flex:0 0 auto}
.kv .v{font-weight:600;flex:1;min-width:0;overflow-wrap:anywhere}

/* notification row */
.notif{display:flex;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.notif::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--azul-400)}
.notif.urgent::before{background:var(--danger)} .notif.saude::before{background:var(--ok)} .notif.transito::before{background:var(--warn)} .notif.evento::before{background:#7a5af0}
.notif .chip{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--azul-100);color:var(--azul-700);flex:0 0 auto}
.notif.urgent .chip{background:var(--danger-bg);color:var(--danger)}
.notif .tx{flex:1;min-width:0}
.notif .tx .lab{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-400)}
.notif .tx b{display:block;font-size:14.5px;font-weight:700;margin:1px 0 3px}
.notif .tx p{margin:0;font-size:13px;color:var(--ink-500);line-height:1.4}
.notif .tx .t{font-size:11.5px;color:var(--ink-400);margin-top:6px;font-weight:600}

/* "Mais" list */
.mlist{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;box-shadow:var(--sh-1)}
.mrow{display:flex;align-items:center;gap:13px;padding:15px 15px;cursor:pointer;text-decoration:none;color:inherit;border-bottom:1px solid var(--line-2)}
.mrow:last-child{border-bottom:0}
.mrow .ico{color:var(--azul-600);flex:0 0 auto}
.mrow b{flex:1;font-size:14.5px;font-weight:700}
.mrow .go{color:var(--ink-400)}
.mgroup-t{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-400);margin:18px 4px 9px}

/* toggle */
.toggle{width:46px;height:28px;border-radius:var(--r-pill);background:#cdd6e3;position:relative;cursor:pointer;flex:0 0 auto;transition:background .2s}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s}
.toggle.on{background:var(--azul-600)} .toggle.on::after{left:21px}

/* painel */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:14px;box-shadow:var(--sh-1)}
.kpi .ico{width:22px;height:22px;color:var(--azul-600)}
.kpi .n{font-size:24px;font-weight:800;margin-top:8px;letter-spacing:-.5px}

.track{height:9px;border-radius:9px;background:#e4ebf4;overflow:hidden}

/* disclaimer / note */

/* ===== Bottom nav ===== */
.tabbar{position:absolute;left:0;right:0;bottom:0;height:76px;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;border:0;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--ink-400);font-family:var(--font);padding-top:10px}
.tab .ico{width:22px;height:22px}
.tab span{font-size:11px;font-weight:700}

.tab .dot{position:absolute;top:14px;margin-left:18px;width:7px;height:7px;border-radius:50%;background:var(--danger)}

/* overlay screen (notificações) */
.sheet-screen{position:absolute;inset:0;background:var(--bg);z-index:50;display:none;flex-direction:column}

/* ===== Ícones: tamanho-base + ajustes por contexto (corrige ícones gigantes) ===== */
.ico{display:inline-block;vertical-align:middle;width:20px;height:20px;flex:0 0 auto}

.block .bh .ico{width:21px;height:21px}
.notif .chip .ico{width:21px;height:21px}

.mrow .ico{width:21px;height:21px}
.mapbox .pin .ico{width:30px;height:30px}
.mapbox .tagm .ico{width:16px;height:16px}

.center{text-align:center}
.spacer{height:6px}

/* ===== Movimento sutil ("app vivo") — discreto, sem exageros ===== */
.feature{background-size:170% 170%;animation:liveGrad 16s ease-in-out infinite}
@keyframes liveGrad{0%{background-position:0% 40%}50%{background-position:100% 60%}100%{background-position:0% 40%}}
.badge-dot,.tab .dot{animation:livePulse 2.6s ease-in-out infinite}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,90,90,.45)}50%{box-shadow:0 0 0 6px rgba(255,90,90,0)}}
.qi,.srv,.news{transition:transform .12s ease,box-shadow .2s ease}
.qi:hover,.srv:hover,.news:hover{box-shadow:var(--sh-2)}
@media(prefers-reduced-motion:reduce){.feature,.badge-dot,.tab .dot,.screen{animation:none}}

/* ===== Splash / abertura ===== */
#splash{position:absolute;inset:0;z-index:200;display:grid;place-items:center;
  background:radial-gradient(120% 90% at 50% 18%,#1565E0 0%,#0B3D91 55%,#0A2A63 100%);
  color:#fff;text-align:center;transition:opacity .5s ease;padding:24px}
#splash.hide{opacity:0;pointer-events:none}
#splash .sp-inner{display:flex;flex-direction:column;align-items:center;animation:spRise .7s ease both}
#splash .sp-ring{width:128px;height:128px;border-radius:50%;display:grid;place-items:center;
  background:rgba(255,255,255,.07);box-shadow:0 0 0 1px rgba(255,255,255,.16) inset;position:relative;margin-bottom:20px}
#splash .sp-ring::before{content:"";position:absolute;inset:-10px;border-radius:50%;
  border:2px solid rgba(255,255,255,.35);border-top-color:transparent;animation:spSpin 1.1s linear infinite}
#splash .sp-brasao{height:84px;width:auto;filter:drop-shadow(0 4px 12px rgba(0,0,0,.35));animation:spPop .8s cubic-bezier(.2,.9,.3,1.4) both}
#splash .sp-name{font-size:22px;font-weight:800;letter-spacing:.2px}
#splash .sp-linha{font-size:13px;opacity:.82;margin-top:6px;max-width:230px;line-height:1.4}
#splash .sp-dots{display:flex;gap:6px;margin-top:22px}
#splash .sp-dots i{width:7px;height:7px;border-radius:50%;background:#fff;opacity:.5;animation:spDot 1s ease-in-out infinite}
#splash .sp-dots i:nth-child(2){animation-delay:.18s}
#splash .sp-dots i:nth-child(3){animation-delay:.36s}
@keyframes spRise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spPop{0%{opacity:0;transform:scale(.6)}100%{opacity:1;transform:scale(1)}}
@keyframes spSpin{to{transform:rotate(360deg)}}
@keyframes spDot{0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
@media(prefers-reduced-motion:reduce){#splash .sp-ring::before,#splash .sp-dots i,#splash .sp-brasao,#splash .sp-inner{animation:none}}

.wl-body{flex:1;overflow-y:auto;background:var(--bg);padding:18px 16px 22px}

.wl-bubble h4{font-size:16px;font-weight:800;margin-bottom:4px;color:var(--ink-800)}
.wl-bubble p{font-size:14px;color:var(--ink-600);line-height:1.5}

.wl-locked .ico{width:17px;height:17px;color:var(--azul-700)}
.wl-select{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:14px;font-size:15px;color:var(--ink-800);background:#fff;font-family:inherit;-webkit-appearance:none;appearance:none}
.wl-geo{margin-top:10px;width:100%;justify-content:center}

.wl-sum{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}

.wl-foot{max-height:60%;overflow-y:auto}

}

function icon(name, cls){
  const toks = (ICO[name]||ICO.info).split('|');
  let body="";
  for(let i=0;i<toks.length;i++){
    const t=toks[i];
    if(t==='C'){ const[cx,cy,r]=(toks[++i]||'12 12 6').split(' '); body+=`<circle cx="${cx}" cy="${cy}" r="${r}"/>`; }
    else if(t[0]==='R'){ const[x,y,w,h,r]=t.slice(1).split(' '); body+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${r??1.5}"/>`; }
    else { body+=`<path d="${t}"/>`; }
  }
  return `<svg class="ico ${cls||''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${body}</svg>`;
}

function newsCard(n, compact){
  if(compact){
    const ni = NEWS_ICON[n.cat] || 'news';
    const thumb = n.img
      ? `<img class="thumb-img" src="${n.img}" alt="" loading="lazy" onerror="this.style.display='none'"/>`
      : icon(ni,'thumb-ic');
    return `<div class="news compact" data-news="${n.id}">
      <div class="thumb" style="${grad(n.grad[0],n.grad[1])}">${thumb}</div>
      <div class="body"><span class="pill" style="background:${n.grad[1]}1f;color:${n.grad[0]}">${n.cat}</span>
      <h4>${n.titulo}</h4><div class="meta">${icon('clock')} ${n.data}</div></div></div>`;
  }
  const hero = n.img
    ? `<img class="thumb-img" src="${n.img}" alt="" loading="lazy" onerror="this.style.display='none'"/>`
    : newsScene(n.cat,n.grad[0],n.grad[1],n.id);
  return `<div class="news" data-news="${n.id}">
    <div class="thumb" style="background:${n.grad[0]}">${hero}<span class="pill" style="color:${n.grad[0]}">${n.cat}</span></div>
    <div class="body"><h4>${n.titulo}</h4><p>${n.resumo}</p><div class="meta">${icon('clock')} ${n.data}</div></div></div>`;
}

/* ===== Mapa real: Leaflet + OpenStreetMap (grátis, sem chave) ===== */
let _avMap=null;
function initAvisosMap(tries){
  const el=document.getElementById('mapAvisos'); if(!el) return;
  if(typeof L==='undefined'){
    if((tries||0)<25){ setTimeout(()=>initAvisosMap((tries||0)+1),160); }
    else { el.innerHTML=`<div class="leaf-fallback">${icon('map')} Mapa indisponível sem internet</div>`; }
    return;
  }
  el.innerHTML="";
  if(_avMap){ try{ _avMap.remove(); }catch(e){} _avMap=null; }
  const pts=CONFIG.blocos.filter(b=>typeof b.lat==='number'&&typeof b.lng==='number');
  const center=pts.length?[pts[0].lat,pts[0].lng]:[-25.3935,-51.4562];
  _avMap=L.map(el,{zoomControl:true,scrollWheelZoom:false}).setView(center,14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(_avMap);
  const cor={run:'#C0392B',prog:'#B5650A',done:'#13864B'};
  pts.forEach(b=>{
    const m=L.circleMarker([b.lat,b.lng],{radius:9,weight:2,color:'#fff',fillColor:(cor[b.status]||'#1565E0'),fillOpacity:1}).addTo(_avMap);
    m.bindPopup(`<b>${b.rua}</b><br>${b.motivo}<br><small>${b.statusTxt} · ${b.trecho}</small>`);
  });
  if(pts.length>1){ try{ _avMap.fitBounds(pts.map(b=>[b.lat,b.lng]),{padding:[28,28]}); }catch(e){} }
  setTimeout(()=>{ try{ _avMap.invalidateSize(); }catch(e){} },220);
}

function helpMenuFoot(){
  return `<div class="wl-acts">

function faqAnswer(i){
  const f=A_FAQ[i]; if(!f) return; wlMsg(f.q,'me');
  wlSay([f.a], ()=>{
    const act=f.ext?`<button class="btn btn-primary" data-aext="${f.ext}" style="width:100%">${f.actLabel} ${icon('ext')}</button>`
             :(f.nav?`<button class="btn btn-primary" data-anav="${f.nav}" style="width:100%">${f.actLabel} ${icon('chev')}</button>`:'');
    wlFoot(`${act}<button class="btn btn-ghost" data-ahome style="width:100%;margin-top:10px">${icon('back')} Voltar ao menu</button>`);
  });
}
function wlScroll(){ const l=document.getElementById('wlLog'); if(l) l.scrollTop=l.scrollHeight; }
function wlMsg(html,who){
  const l=document.getElementById('wlLog'); if(!l) return;
  const d=document.createElement('div'); d.className='wl-msg '+(who||'bot');
  d.innerHTML=(who==='me')?`<div class="wl-bubble me">${html}</div>`
    :`<div class="wl-ava sm">${icon('chat')}</div><div class="wl-bubble">${html}</div>`;
  l.appendChild(d); wlScroll();
}
function wlTyping(on){
  const l=document.getElementById('wlLog'); if(!l) return;
  let t=document.getElementById('wlTyping');
  if(on){ if(t) return; t=document.createElement('div'); t.id='wlTyping'; t.className='wl-msg bot';
    t.innerHTML=`<div class="wl-ava sm">${icon('chat')}</div><div class="wl-bubble typing"><i></i><i></i><i></i></div>`;
    l.appendChild(t); wlScroll(); }
  else if(t){ t.remove(); }
}
function wlFoot(html){
  const f=document.getElementById('wlFoot'); if(!f) return;
  f.innerHTML=html||""; f.classList.remove('show'); void f.offsetWidth; if(html) f.classList.add('show'); wlScroll();
}
function wlSay(msgs, done){
  wBusy=true; wlFoot(""); let i=0;
  (function next(){
    if(i>=msgs.length){ wBusy=false; if(done) done(); return; }
    wlTyping(true);
    setTimeout(()=>{ wlTyping(false); wlMsg(msgs[i],'bot'); i++; setTimeout(next,340); }, 560+Math.random()*340);
  })();
}
function topicsFoot(){
  return `<div class="wl-chips">
      ${CONFIG.topicos.map(t=>`<button class="wl-chip ${wTopics.has(t.id)?'on':''}" data-wtopic="${t.id}">${icon(t.icon)} ${t.label}</button>`).join('')}

}
function bairroFoot(){
  const opts=CONFIG.bairros.map(b=>`<option value="${b}" ${(!wAllCity&&wBairro===b)?'selected':''}>${b}</option>`).join('');
  return `<select class="wl-select" id="wlBairroSel" ${wAllCity?'disabled':''}>${opts}</select>
    <button class="btn btn-light wl-geo" data-wgeo>${icon('target')} Usar minha localização</button>
    <button class="wl-chip ${wAllCity?'on':''}" data-wallcity style="margin-top:12px;width:100%;justify-content:center">${icon('globe')} Quero receber tudo da cidade</button>
    <button class="btn btn-primary" data-wdone style="width:100%;margin-top:12px">Concluir ${icon('check')}</button>`;
}
function wlGo(step){
  wStep=step; const A=CONFIG.assistente;
  if(step===1){
    wlSay([
      `<h4>Oi! Eu sou a ${A.nome} 👋</h4><p>Sou a ${A.papel}. Em menos de 1 minuto eu te ajudo a usar o app e a receber só o que te interessa.</p>`,
      `<p>Aqui tem <b>notícias</b>, <b>serviços</b> (IPTU, guias, protocolos), <b>saúde</b> (UBS ou UPA), <b>avisos de trânsito</b> e <b>notificações</b> da Prefeitura.</p>`,
      `<p>Posso te fazer duas perguntinhas pra deixar o app com a sua cara? 😊</p>`
    ], ()=> wlFoot(`<div class="wl-actions"><button class="btn btn-ghost" data-wskip>Agora não</button><button class="btn btn-primary" data-wnext>Começar ${icon('chev')}</button></div>`));
  } else if(step===2){
    wlMsg('Vamos lá! 🙌','me');
    wlSay([`<b>1 de 2.</b> Sobre o que você quer receber novidades? Toque nos temas que mais combinam com você.`],
      ()=> wlFoot(topicsFoot()));
  } else if(step===3){
    const t=[...wTopics]; wlMsg(t.length? t.map(topicLabel).join(', ') : 'Pode ser depois 🙂','me');
    wlSay([`Boa escolha! <b>2 de 2.</b> De qual parte da cidade você é? Assim eu te aviso de trânsito e obras pertinho de você.`],
      ()=> wlFoot(bairroFoot()));
  } else {
    wlMsg(wAllCity?'Quero tudo da cidade 🌎':(wBairro?('Sou do '+wBairro):'Toda a cidade'),'me');
    wlSay([`<h4>Tudo certo! ✅</h4><p>Prontinho. Dá pra mudar isso quando quiser em <b>Mais → Assistente e meus interesses</b>. Boa navegação! 💙</p>`],
      ()=> wlFoot(`<button class="btn btn-primary" data-wfinish style="width:100%">Explorar o app ${icon('chev')}</button>`));
  }
}
function requestGeo(btn){
  if(!navigator.geolocation){ btn.innerHTML=icon('target')+' Localização indisponível — escolha na lista'; return; }
  btn.innerHTML=icon('target')+' Localizando...';
  navigator.geolocation.getCurrentPosition(
    ()=>{ wAllCity=false; const c=document.querySelector('[data-wallcity]'); if(c)c.classList.remove('on');
          const sel=document.getElementById('wlBairroSel'); if(sel)sel.disabled=false;
          btn.innerHTML=icon('check')+' Localização permitida — confirme o bairro'; },
    ()=>{ btn.innerHTML=icon('target')+' Não consegui acessar — escolha na lista'; }
  );
}
function saveWelcome(){
  PREFS={ topics:[...wTopics], bairro:wAllCity?"":wBairro, allCity:wAllCity, done:true };
  prefsSet(PREFS); closeWelcome(); if(current==='mais') go('mais');
}

/* ===== Splash de abertura ===== */
function bootSplash(){
  const sp=document.getElementById('splash');
  setTimeout(()=>{
    if(sp) sp.classList.add('hide');
    setTimeout(()=>{ if(sp) sp.style.display='none'; if(!PREFS.done) openAssistant('onboard'); }, 520);
  }, 1500);
}

document.addEventListener('click',e=>{
  let h;
  if(h=e.target.closest('[data-tab]')){ notifScreen.classList.remove('is-active'); go(h.dataset.tab); return; }
  if(h=e.target.closest('[data-nav]')){ go(h.dataset.nav); return; }
  if(h=e.target.closest('[data-news]')){ go('detalhe',h.dataset.news); return; }
  if(h=e.target.closest('[data-back]')){ go(backTarget); return; }
  if(h=e.target.closest('[data-closenotif]')){ notifScreen.classList.remove('is-active'); return; }
  if(h=e.target.closest('[data-notif]')){ openNotif(); return; }
  if(h=e.target.closest('[data-priv]')){ const b=document.getElementById('privBox'); if(b) b.style.display=(b.style.display==='none')?'block':'none'; return; }
  if(h=e.target.closest('[data-install]')){ promptInstall(); return; }
  if(h=e.target.closest('[data-welcome]')){ openAssistant('help'); return; }
  if(h=e.target.closest('[data-personalize]')){ openAssistant('onboard'); return; }
  if(h=e.target.closest('[data-anav]')){ const s=h.dataset.anav; closeWelcome(); notifScreen.classList.remove('is-active'); go(s); return; }
  if(h=e.target.closest('[data-aext]')){ const u=h.dataset.aext; closeWelcome(); if(u&&u!=='undefined'&&u!=='null') window.open(u,'_blank','noopener'); return; }
  if(h=e.target.closest('[data-afaq]')){ if(!wBusy) faqAnswer(+h.dataset.afaq); return; }
  if(h=e.target.closest('[data-ahome]')){ if(!wBusy) helpHome(); return; }
  if(h=e.target.closest('[data-wskip]')){ PREFS.done=true; prefsSet(PREFS); closeWelcome(); return; }
  if(h=e.target.closest('[data-wnext]')){ if(!wBusy) wlGo(wStep+1); return; }
  if(h=e.target.closest('[data-wtopic]')){ const id=h.dataset.wtopic; if(wTopics.has(id))wTopics.delete(id); else wTopics.add(id); h.classList.toggle('on'); return; }
  if(h=e.target.closest('[data-wallcity]')){ wAllCity=!wAllCity; const sel=document.getElementById('wlBairroSel'); if(sel)sel.disabled=wAllCity; h.classList.toggle('on'); return; }
  if(h=e.target.closest('[data-wgeo]')){ requestGeo(h); return; }
  if(h=e.target.closest('[data-wdone]')){ const sel=document.getElementById('wlBairroSel'); if(sel&&!wAllCity) wBairro=sel.value; wlGo(4); return; }
  if(h=e.target.closest('[data-wfinish]')){ saveWelcome(); return; }
  if(h=e.target.closest('[data-toggle]')){ h.classList.toggle('on'); return; }
  if(h=e.target.closest('[data-fcat]')){ setChips('#srvChips',h); const c=h.dataset.fcat; document.getElementById('srvList').innerHTML=CONFIG.servicos.filter(s=>c==='Todos'||s.cat===c).map(serviceCard).join(''); return; }
  if(h=e.target.closest('[data-fblk]')){ setChips('#blkChips',h); const c=h.dataset.fblk; document.getElementById('blkList').innerHTML=CONFIG.blocos.filter(b=>c==='Todos'||b.tipo===c).map(blockCard).join(''); return; }
  if(h=e.target.closest('[data-fnews]')){ setChips('#newsChips',h); const c=h.dataset.fnews; document.getElementById('newsList').innerHTML=CONFIG.noticias.filter(n=>c==='Todas'||n.cat===c).map(n=>newsCard(n)).join(''); return; }
  if(h=e.target.closest('[data-fnotif]')){ notifScreen.innerHTML=notifContent(h.dataset.fnotif); return; }
  if(h=e.target.closest('[data-ext]')){ const u=h.dataset.ext; if(u&&u!=='undefined'&&u!=='null') window.open(u,'_blank','noopener'); return; }
});

/* ===== Relógio (visual) ===== */
function tick(){ const d=new Date(); const el=document.getElementById('clock'); if(el) el.textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
tick(); setInterval(tick,15000);

/* ===== PWA: instalação + service worker ===== */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; });
window.addEventListener('appinstalled',()=>{ deferredPrompt=null; const b=document.getElementById('installBox'); if(b) b.style.display='none'; });
function promptInstall(){
  if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt.userChoice.finally(()=>{ deferredPrompt=null; }); return; }
  const b=document.getElementById('installBox'); if(b) b.style.display=(b.style.display==='none')?'block':'none';
}
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}

/* ===== Start ===== */
let _booted=false;
function startApp(){ if(_booted) return; _booted=true; renderTabs(); go('inicio'); bootSplash(); }
/* Carrega as notícias reais: da URL configurada (Apps Script) ou de noticias.json; se faltar, usa as internas. */
fetch((CONFIG.noticiasURL && CONFIG.noticiasURL.trim()) || 'noticias.json',{cache:'no-store'})
  .then(r=> r.ok ? r.json() : null)
  .then(d=>{ const a = d && (d.noticias || d); if(Array.isArray(a) && a.length) CONFIG.noticias = a; })
  .catch(()=>{})
  .finally(startApp);
setTimeout(startApp, 2500);
</script>
